<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#2a1a3a"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="assets/icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="APP Tracker"/>
<title>APP Project Management</title>
<link rel="stylesheet" href="css/main.css"/>
<script>const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);</script>
<style>
#pwa-install-banner {
  display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #2a1a3a; color: white; border-radius: 14px;
  padding: 14px 20px; box-shadow: 0 8px 32px rgba(0,0,0,.3);
  z-index: 9999; align-items: center; gap: 14px; max-width: 340px; width: 90%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#pwa-install-banner.show { display: flex; }
#pwa-install-banner .pwa-text { flex: 1; }
#pwa-install-banner .pwa-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
#pwa-install-banner .pwa-sub   { font-size: 11px; color: rgba(255,255,255,.6); }
#pwa-install-btn  { background: #7c5cbf; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
#pwa-dismiss-btn  { background: none; border: none; color: rgba(255,255,255,.4); font-size: 18px; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body class="login-page">
<div class="login-card">
  <div class="login-brand">
    <img src="assets/logo.png" class="login-logo-img" onerror="this.style.display='none'"/>
    <div class="login-brand-text">
      <h1>APP Project Management</h1>
      <div class="creator">Created by JC A.</div>
    </div>
  </div>
  <div id="login-error" class="alert alert-error" style="display:none;margin-bottom:12px"></div>
  <p class="pick-label">Who are you?</p>
  <div class="member-grid" id="memberGrid">
    <button class="member-btn" data-user="jc" onclick="selectMember(this)">
      <div class="av av-jc" id="av-login-jc">JC</div>
      <span class="mb-name">JC</span><span class="mb-role">Designer</span>
    </button>
    <button class="member-btn" data-user="tamara" onclick="selectMember(this)">
      <div class="av av-tamara" id="av-login-tamara">TA</div>
      <span class="mb-name">Tamara</span><span class="mb-role">QA</span>
    </button>
    <button class="member-btn" data-user="lloyd" onclick="selectMember(this)">
      <div class="av av-lloyd" id="av-login-lloyd">LL</div>
      <span class="mb-name">Lloyd</span><span class="mb-role">Approver</span>
    </button>
  </div>
  <div class="pin-wrap" id="pinWrap" style="display:none">
    <label class="field-label">Enter your PIN</label>
    <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="off"/>
    <p class="pin-hint">Default: JC=1111 · Tamara=2222 · Lloyd=3333</p>
    <div id="pinError" class="alert alert-error" style="display:none;margin-top:8px">Incorrect PIN — try again.</div>
  </div>
  <button class="btn-primary" id="loginBtn" onclick="doLogin()" style="display:none;width:100%;margin-top:1rem;padding:11px">Sign in</button>
</div>
<script type="module" src="js/login.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/app-tracker/sw.js')
      .then(r => console.log('[PWA] Service worker registered'))
      .catch(e => console.log('[PWA] SW registration failed:', e));
  });
}
</script>
<div id="pwa-install-banner">
  <div class="pwa-text">
    <div class="pwa-title">📱 Install APP Tracker</div>
    <div class="pwa-sub">Add to home screen for quick access</div>
  </div>
  <button id="pwa-install-btn" onclick="installPWA()">Install</button>
  <button id="pwa-dismiss-btn" onclick="dismissPWA()">✕</button>
</div>
<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after short delay
  setTimeout(() => {
    const banner = document.getElementById('pwa-install-banner');
    if (banner && !localStorage.getItem('pwa-dismissed')) banner.classList.add('show');
  }, 2000);
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    deferredPrompt = null;
    document.getElementById('pwa-install-banner').classList.remove('show');
  });
}
function dismissPWA() {
  document.getElementById('pwa-install-banner').classList.remove('show');
  localStorage.setItem('pwa-dismissed', '1');
}
</script>
</body>
</html>
