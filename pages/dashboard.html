<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#2a1a3a"/>
  <link rel="manifest" href="../manifest.json"/>
  <link rel="apple-touch-icon" href="../assets/icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="APP Tracker"/>
<title>APP Project Management — Board</title>
<link rel="stylesheet" href="../css/main.css"/>
<script>const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);</script>
</head>
<body>
<div class="app-shell" id="appShell">

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
      <div>
        <div class="topbar-title" id="topGreeting">Board</div>
        <div id="spaceLabel" style="font-size:11px;color:var(--text-3);margin-top:1px"></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="notif-wrap">
        <button class="btn-icon" onclick="toggleNotifs()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5A4 4 0 003.5 5.5V8L2 9.5h11L11.5 8V5.5A4 4 0 007.5 1.5z" stroke="currentColor" stroke-width="1.3"/><path d="M6 9.5v.5a1.5 1.5 0 003 0V9.5" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <div class="notif-panel" id="notifPanel" style="display:none" role="dialog" aria-label="Notifications">
          <div class="notif-head"><span>Notifications</span><button onclick="clearNotifs()" style="font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer">Clear all</button></div>
          <div id="notifList"><p class="notif-empty">No notifications</p></div>
        </div>
      </div>
      <button class="btn-primary new-proj-btn" onclick="openNewProject()">
        <span class="btn-label-d">+ New project</span>
        <span class="btn-label-m" style="display:none">+</span>
      </button>
    </div>
  </div>

  <div class="page-content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="chart-section" id="chartSection">
      <div class="chart-header">
        <div class="chart-title">Project overview</div>
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart(this,'stage')">By stage</button>
          <button class="chart-tab" onclick="switchChart(this,'status')">By status</button>
          <button class="chart-tab" onclick="switchChart(this,'type')">By type</button>
        </div>
      </div>
      <canvas id="projectChart" height="50"></canvas>
    </div>

    <div id="spaceQuickOverview"></div>
    <div class="board-controls" id="boardControls"></div>
    <div class="board-scroll"><div class="board board-7" id="board"></div></div>

    <div class="completed-section">
      <div class="completed-header" onclick="toggleCompleted()">
        <h3>Completed / Published</h3>
        <span class="completed-toggle" id="completedToggle">Show</span>
      </div>
      <div id="completedList" style="display:none"></div>
    </div>
  </div>
</div>

</div>

<!-- New/Edit Modal -->
<div class="modal-overlay" id="projectModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">New project</h3>
      <button class="modal-close" onclick="closeModal()"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field-row"><label class="field-label">Project name *</label><input type="text" id="f-name" class="field-input" placeholder="e.g. May newsletter"/></div>
      <div class="field-row">
        <label class="field-label">Type</label>
        <div id="typeGroup" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <div class="field-row"><label class="field-label">Status</label>
        <div class="seg-group" id="statusGroup">
          <button class="seg-btn active" data-val="In Progress" onclick="setSeg(this,'statusGroup')">In Progress</button>
          <button class="seg-btn" data-val="Need Revision" onclick="setSeg(this,'statusGroup')">Need Revision</button>
          <button class="seg-btn" data-val="Approved" onclick="setSeg(this,'statusGroup')">Approved</button>
          <button class="seg-btn" data-val="Published" onclick="setSeg(this,'statusGroup')">Published</button>
        </div>
      </div>
      <div class="field-row"><label class="field-label">Stage</label><select id="f-stage" class="field-select"></select></div>
      <div class="field-row"><label class="field-label">Due date</label><input type="date" id="f-due" class="field-input"/></div>
      <div class="field-row">
        <label class="field-label">Attach files <span style="font-size:10px;color:var(--text-3);font-weight:400">— up to 5 files, max 10MB each</span></label>
        <div class="file-upload-area" id="fileUploadArea" onclick="document.getElementById('fileInput').click()">
          <div class="file-upload-icon">📎</div>
          <div class="file-upload-text">Click or drag to attach files</div>
          <div class="file-upload-hint">PDF, Word, Images · Max 10MB each · Up to 5 files</div>
          <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.webp" multiple onchange="handleFileSelect(event)"/>
        </div>
        <div id="attachedFilePreview"></div>
      </div>
      <div class="field-row">
        <label class="field-label">Priority</label>
        <div class="seg-group" id="priorityGroup">
          <button class="seg-btn active" data-val="" onclick="setSeg(this,'priorityGroup')">None</button>
          <button class="seg-btn" data-val="High"   onclick="setSeg(this,'priorityGroup')" style="--seg-active-bg:#ffe8e8;--seg-active-color:#a32d2d">🔴 High</button>
          <button class="seg-btn" data-val="Medium" onclick="setSeg(this,'priorityGroup')" style="--seg-active-bg:#fff8e0;--seg-active-color:#7a5a00">🟡 Medium</button>
          <button class="seg-btn" data-val="Low"    onclick="setSeg(this,'priorityGroup')" style="--seg-active-bg:#e8f5ee;--seg-active-color:#1a6e3a">🟢 Low</button>
        </div>
      </div>
      <div class="field-row">
        <label class="field-label">Links <span style="font-size:10px;color:var(--text-3);font-weight:400">— email design, Canva, images, websites</span></label>
        <div id="linkEditorList"></div>
        <div class="link-add-row">
          <input type="text" id="newLinkName" placeholder="Link name (e.g. Email Design)"/>
          <input type="url"  id="newLinkUrl"  placeholder="https://..." onkeydown="if(event.key==='Enter')addLinkRow()"/>
          <button class="link-add-btn" onclick="addLinkRow()">+ Add</button>
        </div>
      </div>
      <div class="field-row">
        <label class="field-label">Notes <span style="font-size:10px;color:var(--text-3);font-weight:400">— type @ to tag someone</span></label>
        <div class="notes-mention-wrap">
          <textarea id="f-notes" class="field-input" rows="2" placeholder="Add notes... use @username to mention someone" oninput="handleNotesMention(event)" onkeydown="handleNotesMentionKey(event)"></textarea>
          <div id="notesMentionPopup" class="notes-mention-popup" style="display:none"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modalSaveBtn" onclick="saveProject()" style="width:auto;height:auto;padding:8px 18px;border-radius:var(--radius-sm)">Save project</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetailOutside(event)">
  <div class="modal modal-xl">
    <div class="modal-header">
      <h3 id="detailTitle">Project</h3>
      <button class="modal-close" onclick="closeDetail()"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<!-- File viewer -->
<!-- File Review Modal -->
<div class="modal-overlay" id="fileViewerModal" onclick="closeFileViewer(event)">
  <div class="modal modal-review" onclick="event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header" style="border-bottom:1px solid var(--border);padding-bottom:12px">
      <div style="flex:1;min-width:0">
        <h3 id="fvTitle" style="margin:0;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">File</h3>
        <div id="fvMeta" style="font-size:11px;color:var(--text-3);margin-top:2px"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
        <button id="fvDownloadAll" class="btn-ghost" style="font-size:11px;padding:5px 10px;display:none" onclick="downloadAllFiles()">⬇ All versions</button>
        <button class="modal-close" onclick="document.getElementById('fileViewerModal').classList.remove('open')"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
    </div>

    <div class="fv-layout">

      <!-- Left: file list tabs (when multiple files on project) -->
      <div class="fv-file-tabs" id="fvFileTabs"></div>

      <!-- Center: preview + version strip -->
      <div class="fv-center">
        <!-- Main preview -->
        <div class="fv-preview" id="fvPreview"></div>

        <!-- Version history strip -->
        <div class="fv-version-strip" id="fvVersionStrip"></div>

        <!-- Actions bar -->
        <div class="fv-actions" id="fvActions">
          <button class="btn-ghost" style="font-size:12px" onclick="fvDownloadCurrent()">⬇ Download</button>
          <label class="btn-ghost" style="font-size:12px;cursor:pointer">
            ↑ Upload new version
            <input type="file" id="fvUploadInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.webp" style="display:none" onchange="fvUploadNewVersion(event)"/>
          </label>
        </div>
      </div>

      <!-- Right: comments panel -->
      <div class="fv-comments-panel" id="fvCommentsPanel">
        <div class="fv-comments-header">Comments &amp; Feedback</div>
        <div class="fv-comments-list" id="fvCommentsList"></div>
        <div class="fv-comment-input-wrap">
          <div class="fv-input-mention-wrap" style="position:relative">
            <textarea id="fvCommentInput" class="fv-comment-input" placeholder="Add feedback… use @ to tag someone" rows="2"
              oninput="fvHandleMention(event)" onkeydown="fvMentionKey(event);if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();fvPostComment();}"></textarea>
            <div class="fv-mention-popup" style="display:none"></div>
          </div>
          <button class="btn-primary" style="font-size:12px;padding:6px 14px;width:auto;height:auto;border-radius:var(--radius-sm)" onclick="fvPostComment()">Post</button>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
.new-proj-btn .btn-label-m { display:none; }
@media(max-width:768px){
  .new-proj-btn{width:36px;height:36px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .new-proj-btn .btn-label-d{display:none;}
  .new-proj-btn .btn-label-m{display:inline;font-size:20px;font-weight:300;line-height:1;}
  .modal-footer .btn-primary{width:auto!important;height:auto!important;padding:9px 18px!important;border-radius:var(--radius-sm)!important;}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script type="module" src="../js/app.js"></script>
<script>
// Detect if app.js module failed to load (e.g. JS error crashed the module)
window.addEventListener("error", function(e) {
  console.error("App error:", e.message, e.filename, e.lineno);
});
window.addEventListener("unhandledrejection", function(e) {
  console.error("Unhandled promise:", e.reason);
});
// Safety net: if openNewProject isn't registered after 3s, something crashed
setTimeout(function() {
  if (typeof window.openNewProject !== "function") {
    console.error("APP TRACKER: app.js module failed to register functions - possible JS error or cache issue");
    // Force reload without cache
    const note = document.createElement("div");
    note.style.cssText = "position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#a32d2d;color:white;padding:12px 20px;border-radius:8px;z-index:9999;font-size:13px;text-align:center;max-width:90vw";
    note.innerHTML = "App failed to load. <a href='javascript:window.location.reload(true)' style='color:white;font-weight:700;text-decoration:underline'>Click here to reload</a>";
    document.body.appendChild(note);
  }
}, 3000);
</script>
<script>
function openSidebar()  { document.getElementById("sidebar").classList.add("mobile-open"); document.getElementById("sidebarOverlay").classList.add("visible"); document.body.style.overflow="hidden"; }
function closeSidebar() { document.getElementById("sidebar").classList.remove("mobile-open"); document.getElementById("sidebarOverlay").classList.remove("visible"); document.body.style.overflow=""; }
window.addEventListener("resize", () => { if(window.innerWidth > 768) closeSidebar(); });
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/app-tracker/sw.js')
      .then(r => console.log('[PWA] Service worker registered'))
      .catch(e => console.log('[PWA] SW registration failed:', e));
  });
}
</script>

<script>
// ── Swipe to close modals ──────────────────────────────────────────────
function initSwipeToClose(modalId) {
  const modal = document.getElementById(modalId); if (!modal) return;
  const inner = modal.querySelector('.modal'); if (!inner) return;
  let startY = 0, isDragging = false;
  inner.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY; isDragging = true;
  }, { passive: true });
  inner.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) inner.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  inner.addEventListener('touchend', e => {
    isDragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    inner.style.transform = '';
    inner.style.transition = 'transform .3s ease';
    setTimeout(() => { inner.style.transition = ''; }, 300);
    if (dy > 100) {
      if (modalId === 'projectModal') closeModal();
      if (modalId === 'detailModal')  closeDetail();
      if (modalId === 'fileViewerModal') document.getElementById('fileViewerModal').classList.remove('open');
    }
  }, { passive: true });
}
document.addEventListener('DOMContentLoaded', () => {
  ['projectModal','detailModal','fileViewerModal'].forEach(initSwipeToClose);
});
// ── Prevent pull-to-refresh on modals ─────────────────────────────────
document.addEventListener('touchmove', e => {
  if (e.target.closest('.modal-overlay.open')) { /* allow scroll inside */ }
}, { passive: false });
</script>
</body>
</html>
