<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#2a1a3a"/>
<link rel="manifest" href="../manifest.json"/>
<link rel="apple-touch-icon" href="../assets/icon-192.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APP Tracker"/>
<title>APP Project Management — Notifications</title>
<link rel="stylesheet" href="../css/main.css"/>
<script>const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);</script>
</head>
<body>
<div class="app-shell" id="appShell">
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
      <div class="topbar-title">Notifications</div>
    </div>
    <div class="topbar-right" style="gap:8px">
      <span id="npiUnreadBadge" class="npi-badge npi-badge-unread" style="display:none"></span>
      <button class="btn-ghost" onclick="markAllRead()" style="font-size:12px">Mark all read</button>
      <button class="btn-ghost" onclick="clearAll()" style="font-size:12px;color:var(--rev-fg)">Clear all</button>
    </div>
  </div>
  <div class="page-content" style="padding:20px 24px">
    <div style="max-width:660px;margin:0 auto"><div id="notifPageList"><p style="color:var(--text-3);font-size:13px;text-align:center;padding:3rem">Loading…</p></div></div>
  </div>
</div>
</div>
<script type="module">
import { subscribeNotifications, markNotifRead, clearNotifications , subscribeSpaceConfigs, subscribeCustomSpaces } from "../js/firebase.js"
import { authGuard, getCurrentSpace, setupSidebar, setupNotifBadge, initTheme, updateThemeBtn, toggleTheme, timeAgo , mergeSpaceConfig, mergeCustomSpaces, BASE_SPACES, getCachedSpaces, cacheSpaces} from "../js/helpers.js"
import { renderSidebar, renderBottomNav } from "../js/sidebar.js";

const CURRENT_USER = authGuard();
if (!CURRENT_USER) throw new Error("not auth");
document.getElementById("appShell").insertAdjacentHTML("afterbegin", renderSidebar("notifications", getCurrentSpace(), getCachedSpaces()));
document.querySelector(".main").insertAdjacentHTML("beforeend", renderBottomNav("notifications"));
setupSidebar(CURRENT_USER);
setupNotifBadge(CURRENT_USER);
// Keep sidebar spaces list in sync with custom spaces
// Keep sidebar in sync with both custom spaces AND space config overrides
let _sidebarCustoms = {};
let _sidebarConfigs = {};
function _refreshPageSidebar() {
  const sb = document.getElementById("sidebar"); if (!sb) return;
  const merged = mergeSpaceConfig(_sidebarConfigs, mergeCustomSpaces(_sidebarCustoms, BASE_SPACES));
  cacheSpaces(merged);
  sb.outerHTML = renderSidebar("notifications", getCurrentSpace(), merged);
  setupSidebar(CURRENT_USER);
}
subscribeCustomSpaces(_cs => { _sidebarCustoms = _cs; _refreshPageSidebar(); });
subscribeSpaceConfigs(_cfg => { _sidebarConfigs = _cfg; _refreshPageSidebar(); });
initTheme(); updateThemeBtn(localStorage.getItem("theme")||"light");
window.toggleTheme = toggleTheme;
window.doLogout = () => { sessionStorage.clear(); window.location.href = "../index.html"; };
window.switchSpace = s => {};
window.clearAll = async () => { await clearNotifications(CURRENT_USER); };

// ── Notification type config ──────────────────────────────────────────────
const NOTIF_CONFIG = {
  mention:   { icon:"🏷",  label:"Mention",     color:"#7c5cbf", bg:"rgba(124,92,191,.1)"  },
  dm:        { icon:"💬",  label:"Message",     color:"#3b7dd8", bg:"rgba(59,125,216,.1)"  },
  stage:     { icon:"📋",  label:"Task",        color:"#2aab6f", bg:"rgba(42,171,111,.1)"  },
  new_task:  { icon:"🆕",  label:"New task",    color:"#e0a030", bg:"rgba(224,160,48,.1)"  },
  published: { icon:"✅",  label:"Published",   color:"#2aab6f", bg:"rgba(42,171,111,.1)"  },
  general:   { icon:"🔔",  label:"Notice",      color:"#888",    bg:"rgba(136,136,136,.08)" },
};

function groupByDate(notifs) {
  const today     = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  const week      = new Date(today); week.setDate(today.getDate()-7);
  const groups    = { Today:[], Yesterday:[], "This week":[], Older:[] };
  notifs.forEach(n => {
    const d = new Date(n.timestamp); d.setHours(0,0,0,0);
    if (d >= today)     groups["Today"].push(n);
    else if (d >= yesterday) groups["Yesterday"].push(n);
    else if (d >= week) groups["This week"].push(n);
    else                groups["Older"].push(n);
  });
  return groups;
}

function renderNotifCard(n) {
  const cfg = NOTIF_CONFIG[n.type] || NOTIF_CONFIG.general;
  const unread = !n.read;
  // Action button
  let actionBtn = "";
  if ((n.type === "stage" || n.type === "new_task") && n.projectId)
    actionBtn = `<button class="npi-action" onclick="event.stopPropagation();goToTask('${n.projectId}','${n.space||'email'}')">View task →</button>`;
  else if (n.type === "mention" && n.projectId)
    actionBtn = `<button class="npi-action" onclick="event.stopPropagation();goToTask('${n.projectId}','${n.space||'email'}')">View task →</button>`;
  else if (n.type === "dm" && n.roomId)
    actionBtn = `<button class="npi-action" onclick="event.stopPropagation();location.href='chat.html'">Open chat →</button>`;

  return `
  <div class="npi-card ${unread ? 'npi-unread' : ''}" onclick="markRead('${n.id}')"
       style="--npi-color:${cfg.color};--npi-bg:${cfg.bg}">
    ${unread ? '<span class="npi-dot"></span>' : ''}
    <div class="npi-icon-wrap" style="background:${cfg.bg}">
      <span style="font-size:18px;line-height:1">${cfg.icon}</span>
    </div>
    <div class="npi-body">
      <div class="npi-type-label" style="color:${cfg.color}">${cfg.label}</div>
      <div class="npi-title">${n.title}</div>
      ${n.message ? `<div class="npi-sub">${n.message}</div>` : ""}
      <div class="npi-footer">
        <span class="npi-time">${timeAgo(n.timestamp)}</span>
        ${actionBtn}
      </div>
    </div>
  </div>`;
}

let _lastNotifKey = "";
let _allNotifs    = [];

subscribeNotifications(CURRENT_USER, notifs => {
  const key = notifs.map(n => n.id + (n.read?"r":"u")).join(",");
  if (key === _lastNotifKey) return;
  _lastNotifKey = key;
  _allNotifs = notifs;
  renderNotifPage(notifs);
});

function renderNotifPage(notifs) {
  const list    = document.getElementById("notifPageList");
  const unreadN = notifs.filter(n => !n.read).length;

  if (!notifs.length) {
    list.innerHTML = `
      <div class="npi-empty">
        <div style="font-size:48px;margin-bottom:12px">🔔</div>
        <div style="font-size:15px;font-weight:600;color:var(--text-1)">You're all caught up</div>
        <div style="font-size:13px;color:var(--text-3);margin-top:4px">No notifications yet</div>
      </div>`;
    return;
  }

  // Update header badge
  const badge = document.getElementById("npiUnreadBadge");
  if (badge) {
    badge.textContent = unreadN > 0 ? `${unreadN} unread` : "All read";
    badge.className   = unreadN > 0 ? "npi-badge npi-badge-unread" : "npi-badge npi-badge-read";
  }

  const groups = groupByDate(notifs);
  let html = "";
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="npi-group-label">${label}</div>
             <div class="npi-group">${items.map(renderNotifCard).join("")}</div>`;
  }
  list.innerHTML = html;
}

window.markRead = async function(id) {
  await markNotifRead(CURRENT_USER, id);
  // Update locally without waiting for Firebase re-render
  const card = document.querySelector(`.npi-card[onclick*="${id}"]`);
  if (card) { card.classList.remove("npi-unread"); card.querySelector(".npi-dot")?.remove(); }
};

window.markAllRead = async function() {
  const unread = _allNotifs.filter(n => !n.read);
  await Promise.all(unread.map(n => markNotifRead(CURRENT_USER, n.id)));
};

window.goToTask = function(projectId, space) {
  sessionStorage.setItem("highlightProject", projectId);
  sessionStorage.setItem("app_space", space);
  location.href = "dashboard.html";
};

// Legacy compat
window.readNotif = id => window.markRead(id);
</script>
<script>
function openSidebar()  { document.getElementById("sidebar").classList.add("mobile-open"); document.getElementById("sidebarOverlay").classList.add("visible"); document.body.style.overflow="hidden"; }
function closeSidebar() { document.getElementById("sidebar").classList.remove("mobile-open"); document.getElementById("sidebarOverlay").classList.remove("visible"); document.body.style.overflow=""; }
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/app-tracker/sw.js')
      .then(r => console.log('[PWA] Service worker registered'))
      .catch(e => console.log('[PWA] SW registration failed:', e));
  });
}
</script>
</body>
</html>
